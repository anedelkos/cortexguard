apiVersion: 1
deleteDatasources:
  - name: Prometheus
    orgId: 1
  - name: Tempo
    orgId: 1
  - name: Loki
    orgId: 1
datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3100
    editable: true
    jsonData:
      lokiSearch:
        datasourceUid: loki
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    editable: true
    jsonData:
      derivedFields:
        - name: TraceID
          matcherRegex: '"trace_id":"([0-9a-f]{32})"'
          url: "${__value.raw}"
          datasourceUid: tempo
          urlDisplayLabel: "View trace in Tempo"
