goal_id: "CHZ-BURGER-002"
status: "PENDING"
device_id: "RoboChef-Alpha"

context:
  user_prompt: "Prepare a medium-rare cheeseburger with toasted bun."

steps:
  # 1. Prep: Slice the bun.
  - step_id: "STEP-BUN-001"
    description: "Slice the bun in half horizontally."
    trace_id: null  # Routine step
    action:
      function_name: "SLICE_ITEM"
      arguments:
        tool_id: "Knife_Station_A"
        item_name: "BUN"
        cut_style: "HORIZONTAL"

  # 2. Cook: Place the patty on the grill.
  # (Source location is inferred from Blackboard)
  - step_id: "STEP-PATTY-002"
    description: "Move raw beef patty from tray onto Grill Slot 1."
    trace_id: null
    action:
      function_name: "PLACE_ITEM"
      arguments:
        tool_id: "RoboticGripper_A"
        item_name: "RAW_PATTY"
        target_location: "Grill_Slot_1"

  # 3. Cook: Apply cheese slice.
  - step_id: "STEP-CHEESE-003"
    description: "Place cheddar cheese slice onto the patty at Grill Slot 1."
    trace_id: null
    action:
      function_name: "PLACE_ITEM"
      arguments:
        tool_id: "RoboticGripper_A"
        item_name: "CHEDDAR_SLICE"
        target_location: "Grill_Slot_1"

  # 4. Assemble: Pick up the cooked patty.
  # (Patty is assumed to be ready and located at Grill_Slot_1)
  - step_id: "STEP-ASSEMBLE-004"
    description: "Lift the finished cheeseburger patty off the grill and transfer to the assembly area."
    trace_id: null
    action:
      function_name: "PLACE_ITEM"
      arguments:
        tool_id: "RoboticSpatula_B"
        item_name: "COOKED_CHEESY_PATTY"
        target_location: "Assembly_Plate_Area"

  # 5. Assemble: Stack patty onto the bun.
  - step_id: "STEP-ASSEMBLE-005"
    description: "Align and stack the patty onto the toasted bun halves."
    trace_id: null
    action:
      function_name: "ALIGN_AND_STACK"
      arguments:
        tool_id: "RoboticArm_Mover"
        bottom_layer: "TOASTED_BUN_BOTTOM"
        top_component: "CHEESY_PATTY"
        location: "Assembly_Plate_Area"

  # 6. Serve: Deliver the final burger.
  - step_id: "STEP-SERVE-006"
    description: "Transfer the completed burger to the customer service window."
    trace_id: null
    action:
      function_name: "DELIVER_ORDER"
      arguments:
        tool_id: "ServingTray_Arm"
        order_id: "CHZ-BURGER-002"
        pickup_area: "ServiceWindow_1"
