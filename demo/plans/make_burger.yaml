
goal_id: "CHZ-BURGER-002"
created_at: 1705844000 # Unix Timestamp
status: "PENDING"
device_id: "RoboChef-Alpha" # The primary cooking robot

# Context: The high-level objective to be achieved.
context:
  user_prompt: "Please prepare a medium-rare cheeseburger with toasted bun."
  goal_id: "CHZ-BURGER-002"
  priority: 9

steps:
  # 1. Prep: Toast the bun (using the grill after the patty).
  - step_id: "STEP-BUN-001"
    description: "Slice the bun and place it on the grill for light toasting."
    action:
      tool_id: "UtilityKnife_Station"
      capability: "SLICE_OBJECT"
      parameters:
        object: "BUN"
        cut_style: "HORIZONTAL"

  # 2. Cook: Place the patty on the grill.
  - step_id: "STEP-PATTY-002"
    description: "Pick up the raw patty and place it on Grill Slot 1."
    action:
      tool_id: "RoboticGripper_A"
      capability: "PICK_AND_PLACE"
      parameters:
        source: "PattyTray_Frozen"
        target: "GrillSlot_1"
        object_type: "BEEF_PATTY"

  # 3. Cook: Apply cheese slice.
  - step_id: "STEP-CHEESE-003"
    description: "Wait for the patty to reach internal temperature of 130F (Medium-Rare) and place cheese."
    action:
      tool_id: "RoboticGripper_A"
      capability: "PLACE_CHEESE"
      parameters:
        target: "GrillSlot_1"
        cheese_type: "CHEDDAR"
        # The Edge orchestrator is responsible for managing the grill time/temperature.

  # 4. Assemble: Pick up the cooked patty with melted cheese.
  - step_id: "STEP-ASSEMBLE-004"
    description: "Lift the finished cheeseburger patty off the grill."
    action:
      tool_id: "RoboticSpatula_B"
      capability: "TRANSFER_OBJECT"
      parameters:
        source: "GrillSlot_1"
        destination: "Assembly_Plate"
        object_type: "COOKED_PATTY"

  # 5. Assemble: Place patty onto the toasted bun.
  - step_id: "STEP-ASSEMBLE-005"
    description: "Place the cooked patty onto the bottom half of the toasted bun on the assembly plate."
    action:
      tool_id: "RoboticArm_Mover"
      capability: "ALIGN_AND_STACK"
      parameters:
        bottom_layer: "TOASTED_BUN_BOTTOM"
        top_layer: "COOKED_PATTY"
        location: "Assembly_Plate"

  # 6. Serve: Move the final burger to the service window.
  - step_id: "STEP-SERVE-006"
    description: "Transfer the completed burger to the serving pickup area."
    action:
      tool_id: "ServingTray_Arm"
      capability: "DELIVER_ITEM"
      parameters:
        pickup_area: "ServiceWindow_1"
        item_name: "Cheeseburger"
