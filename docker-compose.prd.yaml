networks:
  cortexguard_net:
    driver: bridge

volumes:
  grafana-data:

services:
  edge:
    image: cortexguard-edge:latest
    build:
      context: .
      dockerfile: docker/edge.Dockerfile
    container_name: cortexguard-edge
    depends_on:
      - tempo
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/healthz" ]
      interval: 3s
      timeout: 2s
      retries: 10
    environment:
      - LOG_LEVEL=INFO
      - LOG_JSON=true
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      - cortexguard_net

  simulator:
    image: cortexguard-simulator:latest
    build:
      context: .
      dockerfile: docker/simulator.Dockerfile
    container_name: cortexguard-simulator
    depends_on:
      edge:
        condition: service_healthy
    working_dir: /workspace/cortexguard
    command: []
    environment:
      - PYTHONUNBUFFERED=1
      - UV_ENV=prod
      - FUSED_DIR=/workspace/cortexguard/data/fused
      - LOG_LEVEL=INFO
      - LOG_JSON=true
    # No volume mounts — uses built-in COPY layers
    expose:
      - "8080"
    restart: unless-stopped
    networks:
      - cortexguard_net

  prometheus:
    image: prom/prometheus:latest
    container_name: cortexguard-prometheus
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./docker/cortexguard_alerts.yml:/etc/prometheus/cortexguard_alerts.yml
    ports:
      - "9090:9090"
    networks:
      - cortexguard_net

  grafana:
    image: grafana/grafana:latest
    container_name: cortexguard-grafana
    ports:
      - "3000:3000"
    volumes:
      - ./docker/grafana_datasources.yaml:/etc/grafana/provisioning/datasources/cortexguard.yaml:ro
      - ./docker/grafana_dashboards.yaml:/etc/grafana/provisioning/dashboards/cortexguard-dashboards.yaml:ro
      - ./docker/grafana_dashboard.json:/var/lib/grafana/dashboards/cortexguard-edge.json:ro
      - grafana-data:/var/lib/grafana
    networks:
      - cortexguard_net

  tempo:
    image: grafana/tempo:latest
    container_name: cortexguard-tempo
    volumes:
      - ./docker/tempo.yaml:/etc/tempo.yaml:ro
      - ./docker/tempo-data:/var/tempo
    command: ["--config.file=/etc/tempo.yaml"]
    ports:
      - "4318:4318"
      - "3100:3100"
    networks:
      - cortexguard_net
