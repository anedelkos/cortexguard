name: CI/CD

on:
  push:
    branches: [main, develop]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  packages: write
  security-events: write

env:
  UV_CACHE_DIR: .cache/uv
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/edge

# ─── Lint ─────────────────────────────────────────────────────────────────────

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/cache@v4
        with:
          path: .cache/uv
          key: uv-${{ hashFiles('uv.lock') }}
          restore-keys: uv-

      - name: Setup
        run: |
          curl -fsSL https://taskfile.dev/install.sh | sh && mv ./bin/task /usr/local/bin/task
          python3.12 -m venv .venv-local
          .venv-local/bin/pip install --quiet --upgrade pip 'uv>=0.9.5'
          .venv-local/bin/python -m uv sync --group dev --frozen --active

      - name: Lint
        run: task lint

      - name: Typecheck
        run: task typecheck

# ─── Test ─────────────────────────────────────────────────────────────────────

  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/cache@v4
        with:
          path: .cache/uv
          key: uv-${{ hashFiles('uv.lock') }}
          restore-keys: uv-

      - name: Setup
        run: |
          curl -fsSL https://taskfile.dev/install.sh | sh && mv ./bin/task /usr/local/bin/task
          python3.12 -m venv .venv-local
          .venv-local/bin/pip install --quiet --upgrade pip 'uv>=0.9.5'
          .venv-local/bin/python -m uv sync --group dev --frozen --active

      - name: Run unit tests
        run: |
          PYTHONPATH=src:$(pwd) .venv-local/bin/python -m uv run --active pytest -v tests/unit \
            --maxfail=1 --disable-warnings --cov-fail-under=0

      - name: Save unit coverage
        run: mv .coverage .coverage.unit

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: .coverage.unit
          retention-days: 1
          include-hidden-files: true

  test-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/cache@v4
        with:
          path: .cache/uv
          key: uv-${{ hashFiles('uv.lock') }}
          restore-keys: uv-

      - name: Setup
        run: |
          curl -fsSL https://taskfile.dev/install.sh | sh && mv ./bin/task /usr/local/bin/task
          python3.12 -m venv .venv-local
          .venv-local/bin/pip install --quiet --upgrade pip 'uv>=0.9.5'
          .venv-local/bin/python -m uv sync --group dev --frozen --active

      - name: Run integration tests
        run: |
          PYTHONPATH=src:$(pwd) .venv-local/bin/python -m uv run --active pytest -v \
            -m "integration and not llm_slow" --maxfail=1 --disable-warnings \
            --cov-fail-under=0

      - name: Save integration coverage
        run: mv .coverage .coverage.integration

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: .coverage.integration
          retention-days: 1
          include-hidden-files: true

# ─── Coverage ─────────────────────────────────────────────────────────────────

  coverage:
    runs-on: ubuntu-latest
    needs: [test-unit, test-integration]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/cache@v4
        with:
          path: .cache/uv
          key: uv-${{ hashFiles('uv.lock') }}
          restore-keys: uv-

      - name: Setup
        run: |
          python3.12 -m venv .venv-local
          .venv-local/bin/pip install --quiet --upgrade pip 'uv>=0.9.5'
          .venv-local/bin/python -m uv sync --group dev --frozen --active

      - uses: actions/download-artifact@v4
        with:
          name: coverage-unit

      - uses: actions/download-artifact@v4
        with:
          name: coverage-integration

      - name: Combine and check coverage
        run: |
          .venv-local/bin/python -m coverage combine .coverage.unit .coverage.integration
          .venv-local/bin/python -m coverage report --fail-under=80
          .venv-local/bin/python -m coverage xml

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

# ─── Security ─────────────────────────────────────────────────────────────────

  security:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/cache@v4
        with:
          path: .cache/uv
          key: uv-${{ hashFiles('uv.lock') }}
          restore-keys: uv-

      - name: Setup
        run: |
          curl -fsSL https://taskfile.dev/install.sh | sh && mv ./bin/task /usr/local/bin/task
          python3.12 -m venv .venv-local
          .venv-local/bin/pip install --quiet --upgrade pip 'uv>=0.9.5'
          .venv-local/bin/python -m uv sync --group dev --frozen --active

      - name: Safety + Vulture
        run: |
          task safety
          task vulture

  codeql:
    runs-on: ubuntu-latest
    if: github.event.repository.visibility == 'public'
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3

# ─── Build ────────────────────────────────────────────────────────────────────

  build:
    runs-on: ubuntu-latest
    needs: [lint, coverage, security]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push full image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/edge.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache,mode=max

      - name: Build and push slim image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/edge.Dockerfile
          build-args: SLIM=true
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}-slim
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-slim
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache-slim
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache-slim,mode=max

# ─── Release ──────────────────────────────────────────────────────────────────

  release:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag as latest
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}-slim
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}-slim ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-slim
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-slim

      - name: Tag semver
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}-slim ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-slim
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-slim
